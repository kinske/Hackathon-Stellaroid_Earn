name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release-stellaroid-earn:
    permissions:
      id-token: write
      contents: write
      attestations: write
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Stellaroid Earn — on-chain credential registry for Stellar PH Bootcamp'
      relative_path: 'contract'
      package: 'stellaroid_earn'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
